<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO / Meta -->
    <title>UFUDrive — Organização Acadêmica</title>
    <meta name="description" content="Sistema de organização acadêmica integrado ao Google Drive. Anotações, flashcards, calculadora de notas, Kanban e mais." />
    <meta name="author" content="UFU / FEELT" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA -->
    <link rel="manifest" href="/UFUDrive/manifest.json" />
    <link rel="apple-touch-icon" href="/UFUDrive/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UFUDrive" />

    <!-- Open Graph -->
    <meta property="og:title" content="UFUDrive" />
    <meta property="og:description" content="Sua vida acadêmica, organizada." />
    <meta property="og:type" content="website" />

    <!-- Favicon SVG inline -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='20' font-family='system-ui' fill='white'>U</text></svg>" />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google Fonts (preconnect + display=swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
